<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hermes — Excel</title>
  <link rel="stylesheet" href="taskpane.css" />
</head>

<body>
  <div id="app">
    <div id="header">
      <div class="brand">
        <div class="brand-icon">H</div>
        <div class="brand-text">
          <span class="brand-title">Hermes</span>
          <span id="status">Sẵn sàng</span>
        </div>
      </div>
      <button id="newchat" class="icon-btn" title="Cuộc hội thoại mới" aria-label="New chat">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 3-6.7L3 8" />
          <path d="M3 3v5h5" />
        </svg>
      </button>
    </div>

    <div id="log"></div>

    <div id="preview"></div>

    <button id="apply">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </svg>
      Áp dụng thay đổi
    </button>

    <div id="composer">
      <textarea id="prompt" rows="1" placeholder="Hỏi tôi về dữ liệu trên bảng tính…"></textarea>
      <button id="ask" data-keep-selection="true" aria-label="Send">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2 11 13" />
          <path d="M22 2 15 22l-4-9-9-4 20-7Z" />
        </svg>
        <span class="spinner"></span>
      </button>
    </div>
  </div>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="taskpane.js"></script>
</body>

</html>
