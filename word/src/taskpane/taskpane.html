<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Hermes — Word</title>
    <link rel="stylesheet" href="assets/design-system.css" />
  </head>

  <body class="theme-word">
    <div id="app" class="ds-app">
      <header id="header" class="ds-header">
        <div class="ds-brand">
          <span class="mark">H</span>
          <span>Hermes</span>
        </div>
        <div class="ds-actions">
          <button
            id="newchat"
            class="ds-icon-btn"
            type="button"
            title="Cuộc hội thoại mới"
            aria-label="New chat"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M3 12a9 9 0 1 0 3-6.7L3 8" />
              <path d="M3 3v5h5" />
            </svg>
          </button>
        </div>
      </header>

      <!-- Dedicated status bar — dot + text on its own row so the header
           stays brand-only. Tone is mirrored onto the row by taskpane.js. -->
      <div id="statusRow" class="ds-status-row">
        <span class="dot" aria-hidden="true"></span>
        <span id="status" class="ds-status" role="status" aria-live="polite">Sẵn sàng</span>
      </div>

      <!-- Context chips (Pinned / Snapshot / warnings) render here instead
           of inside the header — see refreshContextBar() in taskpane.js. -->
      <div id="contextRow"></div>

      <div id="log" class="ds-log" role="log" aria-live="polite"></div>

      <div
        id="preview"
        class="ds-preview"
        role="region"
        aria-label="Proposed changes"
      ></div>

      <label id="markRedWrap" class="ds-toggle-row" data-show="false">
        <input type="checkbox" id="markRed" checked />
        <span>Đánh dấu đỏ phần đã sửa</span>
      </label>

      <button
        id="apply"
        class="ds-btn ds-btn-primary"
        type="button"
        style="
          display: none;
          margin: 0 14px 10px;
          width: calc(100% - 28px);
          height: 42px;
        "
      >
        Áp dụng thay đổi
      </button>

      <div id="composer" class="ds-foot">
        <textarea
          id="prompt"
          class="ds-input"
          rows="1"
          placeholder="Hỏi tôi sửa đoạn văn bản đã chọn…"
        ></textarea>
        <button id="ask" class="ds-send" type="button" aria-label="Gửi">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M22 2 11 13" />
            <path d="M22 2 15 22l-4-9-9-4 20-7Z" />
          </svg>
        </button>
      </div>
    </div>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  </body>
</html>
