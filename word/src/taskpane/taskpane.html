<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hermes — Word</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f7;
      --bg-tertiary: #e8e8ed;
      --label: #1d1d1f;
      --label-secondary: #6e6e73;
      --label-tertiary: #aeaeb2;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --green: #34c759;
      --green-hover: #30b14e;
      --separator: rgba(0, 0, 0, 0.08);
      --bubble-bot: #f2f2f7;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--label);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    /* ---- header ---- */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--separator);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, #0a84ff, #5e5ce6);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 2px 6px rgba(10, 132, 255, 0.35);
      flex: none;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .brand-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    #status {
      font-size: 11px;
      color: var(--label-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: var(--bg-tertiary);
      color: var(--label-secondary);
      display: grid;
      place-items: center;
      cursor: pointer;
      flex: none;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .icon-btn:hover {
      background: #dcdce1;
    }

    .icon-btn:active {
      transform: scale(0.92);
    }

    /* ---- messages ---- */
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 86%;
      padding: 10px 14px;
      font-size: 14px;
      word-break: break-word;
      white-space: pre-wrap;
      box-shadow: var(--shadow);
      animation: pop 0.25s cubic-bezier(0.2, 0.8, 0.3, 1);
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: translateY(6px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-radius: 18px 18px 5px 18px;
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bubble-bot);
      color: var(--label);
      border-radius: 18px 18px 18px 5px;
    }

    /* ---- preview / proposals ---- */
    #preview {
      margin: 0 12px;
      padding: 12px 14px;
      background: rgba(0, 113, 227, 0.06);
      border: 0.5px solid rgba(0, 113, 227, 0.18);
      border-radius: 14px;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: pop 0.25s cubic-bezier(0.2, 0.8, 0.3, 1);
    }

    #preview:empty {
      display: none;
    }

    .act {
      color: var(--accent);
      font-weight: 600;
      font-size: 12.5px;
    }

    #preview .msg.bot {
      box-shadow: none;
      background: rgba(255, 255, 255, 0.7);
    }

    /* ---- composer ---- */
    #composer {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 0.5px solid var(--separator);
    }

    #prompt {
      flex: 1;
      min-height: 38px;
      max-height: 120px;
      resize: none;
      border: 0.5px solid var(--separator);
      border-radius: 19px;
      padding: 9px 14px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.35;
      background: var(--bg-secondary);
      color: var(--label);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    #prompt::placeholder {
      color: var(--label-tertiary);
    }

    #prompt:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
      background: #fff;
    }

    #ask {
      width: 38px;
      height: 38px;
      flex: none;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    #ask:hover {
      background: var(--accent-hover);
    }

    #ask:active {
      transform: scale(0.92);
    }

    #ask:disabled {
      opacity: 0.55;
      cursor: default;
    }

    #ask svg {
      width: 18px;
      height: 18px;
    }

    /* spinner replaces icon while thinking */
    #ask .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.45);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    #ask:disabled .icon {
      display: none;
    }

    #ask:disabled .spinner {
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* full-width apply CTA */
    #apply {
      display: none;
      width: calc(100% - 24px);
      margin: 0 12px 8px;
      height: 42px;
      border: none;
      border-radius: 13px;
      background: var(--green);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.1px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      gap: 7px;
      box-shadow: 0 2px 10px rgba(52, 199, 89, 0.3);
      transition: background 0.15s ease, transform 0.1s ease;
      animation: pop 0.25s cubic-bezier(0.2, 0.8, 0.3, 1);
    }

    #apply:hover {
      background: var(--green-hover);
    }

    #apply:active {
      transform: scale(0.985);
    }

    #apply svg {
      width: 17px;
      height: 17px;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="header">
      <div class="brand">
        <div class="brand-icon">H</div>
        <div class="brand-text">
          <span class="brand-title">Hermes</span>
          <span id="status">Sẵn sàng</span>
        </div>
      </div>
      <button id="newchat" class="icon-btn" title="Cuộc hội thoại mới" aria-label="New chat">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 3-6.7L3 8" />
          <path d="M3 3v5h5" />
        </svg>
      </button>
    </div>

    <div id="log"></div>

    <div id="preview"></div>

    <label id="markRedWrap" style="display:none; margin:0 12px 8px; font-size:12.5px; color:var(--label-secondary); cursor:pointer;">
      <input type="checkbox" id="markRed" checked /> Đánh dấu đỏ phần đã sửa
    </label>

    <button id="apply">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </svg>
      Áp dụng thay đổi
    </button>

    <div id="composer">
      <textarea id="prompt" rows="1" placeholder="Hỏi tôi sửa đoạn văn bản đã chọn…"></textarea>
      <button id="ask" data-keep-selection="true" aria-label="Send">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2 11 13" />
          <path d="M22 2 15 22l-4-9-9-4 20-7Z" />
        </svg>
        <span class="spinner"></span>
      </button>
    </div>
  </div>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="taskpane.js"></script>
</body>

</html>
